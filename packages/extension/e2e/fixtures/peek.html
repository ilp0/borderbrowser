<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BorderBrowser hover-peek fixture</title>
    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
        max-width: 720px;
        margin: 60px auto;
        padding: 0 20px;
        font-size: 18px;
        line-height: 1.6;
        color: #1a1a1a;
      }
      p {
        margin: 24px 0;
      }
    </style>
  </head>
  <body>
    <h1>Hover-peek demo</h1>
    <p data-bb-original="Bonjour le monde. Ceci est le texte original en français.">
      Hello world. This is the translated text in English.
    </p>
    <p data-bb-original="Le renard brun rapide saute par-dessus le chien paresseux.">
      The quick brown fox jumps over the lazy dog.
    </p>

    <!--
      Standalone harness that mirrors what the production content script does
      after a successful translation: stash the original innerHTML in a
      WeakMap and call attachPeek() per leaf-block. We inline the hover-peek
      module here so this fixture can be opened with `file://` directly,
      independent of the extension build.
    -->
    <script type="module">
      const HOVER_DELAY_MS = 400;
      const FADE_MS = 180;
      const originals = new WeakMap();
      const tracked = new WeakMap();
      let peekHost = null;
      let peekShadow = null;
      let peekPanel = null;
      let activeFor = null;
      let pendingTimer = null;

      function isReducedMotion() {
        return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }

      function ensurePeekHost() {
        if (peekHost) return;
        peekHost = document.createElement("bb-peek-host");
        document.documentElement.appendChild(peekHost);
        peekShadow = peekHost.attachShadow({ mode: "closed" });
        const style = document.createElement("style");
        style.textContent = `
          :host { all: initial; }
          .panel {
            position: absolute; z-index: 2147483646; box-sizing: border-box;
            padding: 6px 10px; margin-top: 2px;
            border-left: 2px solid rgba(120,120,120,0.35);
            color: rgba(60,60,60,0.78);
            font-style: italic; font-size: 0.85em; line-height: 1.4;
            pointer-events: none; opacity: 0;
            transition: opacity ${FADE_MS}ms ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          }
          .panel.show { opacity: 1; }
        `;
        const panel = document.createElement("div");
        panel.className = "panel";
        const content = document.createElement("div");
        content.id = "content";
        panel.append(content);
        peekShadow.append(style, panel);
        peekPanel = panel;
      }

      function positionPeek(el) {
        const rect = el.getBoundingClientRect();
        peekPanel.style.top = `${Math.round(rect.bottom + window.scrollY + 4)}px`;
        peekPanel.style.left = `${Math.round(rect.left + window.scrollX)}px`;
        peekPanel.style.width = `${Math.round(rect.width)}px`;
      }

      function showPeek(el) {
        const original = originals.get(el);
        if (!original) return;
        ensurePeekHost();
        const content = peekShadow.getElementById("content");
        content.textContent = original;
        positionPeek(el);
        activeFor = el;
        peekPanel.classList.add("show");
      }
      function hidePeek() {
        if (!peekPanel) return;
        peekPanel.classList.remove("show");
        activeFor = null;
      }

      function attachPeek(el, originalText) {
        originals.set(el, originalText);
        if (tracked.has(el)) return;
        const onEnter = () => {
          if (pendingTimer) clearTimeout(pendingTimer);
          if (activeFor && activeFor !== el) hidePeek();
          const delay = isReducedMotion() ? 0 : HOVER_DELAY_MS;
          pendingTimer = setTimeout(() => {
            pendingTimer = null;
            showPeek(el);
          }, delay);
        };
        const onLeave = () => {
          if (pendingTimer) clearTimeout(pendingTimer);
          if (activeFor === el) hidePeek();
        };
        el.addEventListener("mouseenter", onEnter);
        el.addEventListener("mouseleave", onLeave);
        tracked.set(el, { onEnter, onLeave });
      }

      for (const p of document.querySelectorAll("p[data-bb-original]")) {
        attachPeek(p, p.getAttribute("data-bb-original"));
      }
    </script>
  </body>
</html>
