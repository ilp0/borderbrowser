<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Recette de crêpes</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Recipe",
        "name": "Crêpes au sucre",
        "description": "Une recette française classique pour des crêpes fines.",
        "image": "https://example.com/crepes.jpg",
        "author": { "@type": "Person", "name": "Marie Dupont" },
        "datePublished": "2020-01-15",
        "totalTime": "PT30M",
        "recipeYield": "8 crêpes",
        "recipeCuisine": "French",
        "recipeIngredient": [
          "250 g de farine",
          "4 œufs",
          "500 ml de lait",
          "1 pincée de sel"
        ],
        "recipeInstructions": [
          {
            "@type": "HowToStep",
            "name": "Mélanger",
            "text": "Mélanger la farine et les œufs dans un grand bol."
          },
          {
            "@type": "HowToStep",
            "name": "Ajouter le lait",
            "text": "Ajouter progressivement le lait en remuant."
          },
          {
            "@type": "HowToStep",
            "name": "Cuire",
            "text": "Cuire la pâte dans une poêle chaude pendant deux minutes."
          }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Combien de temps puis-je conserver la pâte ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "La pâte se conserve une journée au réfrigérateur dans un récipient hermétique."
            }
          },
          {
            "@type": "Question",
            "name": "Puis-je congeler les crêpes ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui, les crêpes se congèlent très bien empilées avec du papier sulfurisé."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <h1>Crêpes au sucre</h1>
    <p>Une recette française classique pour des crêpes fines.</p>
    <h2>Étapes</h2>
    <ol>
      <li>Mélanger la farine et les œufs dans un grand bol.</li>
      <li>Ajouter progressivement le lait en remuant.</li>
      <li>Cuire la pâte dans une poêle chaude pendant deux minutes.</li>
    </ol>
  </body>
</html>
